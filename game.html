<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARC Engine - Phase 1</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0f0;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #pause-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            pointer-events: all;
        }

        .ui-btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .ui-btn:hover {
            background: #0c0;
        }
    </style>
</head>

<body>
    <div id="pause-overlay">
        <h1>PAUSED</h1>
        <button id="resume-btn" class="ui-btn">RESUME</button>
        <button id="swap-char-btn" class="ui-btn">CHANGE CHARACTER</button>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/main.js"></script>
</body>

</html>
