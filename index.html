<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARC Engine - Title Screen</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e8d4b4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        #title-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: float 6s ease-in-out infinite;
            z-index: 10;
            position: relative;
            margin-top: -15vh;
        }

        #logo {
            max-width: 55vw;
            min-width: 300px;
            display: block;
            filter: drop-shadow(0px 10px 20px rgba(0, 0, 0, 0.4));
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .menu-container {
            margin-top: -10%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #ffffff;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8vw;
            font-weight: bold;
            letter-spacing: 12px;
            cursor: pointer;
            text-transform: uppercase;
            padding: 10px 40px;
            transition: all 0.3s;
        }

        .menu-btn:hover {
            color: #fff;
            letter-spacing: 16px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
            transform: scale(1.05);
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <div class="vignette"></div>
    <div id="title-wrapper">
        <img id="logo" src="./assets/ui/logo.png" alt="SPARC Logo">
        <div class="menu-container"><button id="start-btn" class="menu-btn">START</button></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';

        const rocketUrl = './assets/models/rocket_low_poly.glb?url';
        const skyboxUrl = './assets/models/skybox_skydays_3.glb?url';
        const vanUrl = './assets/models/van.glb?url';
        const cactusUrl = './assets/models/low_poly_cactus.glb?url';
        const rockSetUrl = './assets/models/low_poly_rock_set.glb?url';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#e8d4b4');
        scene.fog = new THREE.Fog('#e8d4b4', 5, 140);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 12);
        camera.lookAt(0, 2, -50);

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);

        scene.add(new THREE.AmbientLight(0xffeedd, 2.5));
        const sun = new THREE.DirectionalLight(0xfffaeb, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const loader = new GLTFLoader();

        // 1. Skybox
        loader.load(skyboxUrl, (gltf) => {
            const sky = gltf.scene;
            sky.scale.set(0.015, 0.015, 0.015);
            sky.traverse(child => { if (child.material) child.material.fog = false; });
            scene.add(sky);
        });

        // 2. Road & Floor
        const roadTex = new THREE.CanvasTexture((() => {
            const c = document.createElement('canvas'); c.width = 128; c.height = 256;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, 128, 256);
            ctx.fillStyle = '#fb0'; ctx.fillRect(60, 20, 8, 60); ctx.fillRect(60, 140, 8, 60);
            return c;
        })());
        roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
        const road = new THREE.Mesh(new THREE.PlaneGeometry(35, 800), new THREE.MeshStandardMaterial({ map: roadTex }));
        road.rotation.x = -Math.PI / 2; road.position.z = -300;
        scene.add(road);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({ color: 0xd4b878 }));
        floor.rotation.x = -Math.PI / 2; floor.position.y = -0.4;
        scene.add(floor);

        // 3. Van
        let activeVan = null;
        loader.load(vanUrl, (gltf) => {
            activeVan = gltf.scene;
            activeVan.position.set(0, 0, -5);
            activeVan.scale.set(1.5, 1.5, 1.5);
            activeVan.rotation.y = Math.PI / 2; // Facing away from camera
            scene.add(activeVan);
        });

        // 4. Rocket
        loader.load(rocketUrl, (gltf) => {
            const r = gltf.scene;
            r.position.set(0, 0, -130);
            r.scale.set(45, 45, 45);
            scene.add(r);
        });

        // 5. Props
        const props = [];
        const spawnGroup = (url, scale, yOffset) => {
            loader.load(url, (gltf) => {
                for (let i = 0; i < 10; i++) {
                    const p = gltf.scene.clone();
                    const side = Math.random() > 0.5 ? 1 : -1;
                    p.position.set(side * (25 + Math.random() * 50), yOffset, -Math.random() * 250);
                    p.scale.set(scale, scale, scale);
                    p.rotation.y = Math.random() * Math.PI;
                    scene.add(p);
                    props.push(p);
                }
            });
        };
        spawnGroup(cactusUrl, 1.2, -4.5); // Buried pots
        spawnGroup(rockSetUrl, 0.6, -0.5);

        // 6. Dust System
        const dustCount = 350;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount * 3; i++) dustPos[i] = (Math.random() - 0.5) * 100;
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustPoints = new THREE.Points(dustGeo, new THREE.PointsMaterial({ color: 0xedcca8, size: 0.35, transparent: true, opacity: 0.4, depthWrite: false }));
        scene.add(dustPoints);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            roadTex.offset.y -= 1.6 * delta;

            if (activeVan) activeVan.position.y = Math.sin(elapsed * 25) * 0.05;

            props.forEach(p => {
                p.position.z += 65 * delta;
                if (p.position.z > 30) {
                    p.position.z = -250 - (Math.random() * 50);
                    const side = Math.random() > 0.5 ? 1 : -1;
                    p.position.x = side * (25 + Math.random() * 50);
                }
            });

            const d = dustPoints.geometry.attributes.position.array;
            for (let i = 0; i < dustCount; i++) {
                d[i * 3 + 2] += 75 * delta;
                if (d[i * 3 + 2] > 15) {
                    d[i * 3 + 2] = -180;
                    d[i * 3] = (Math.random() - 0.5) * 100;
                }
            }
            dustPoints.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }
        animate();

        // 7. Transition
        document.getElementById('start-btn').addEventListener('click', () => {
            const iris = document.createElement('div');
            iris.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:250vmax;height:250vmax;border-radius:50%;box-shadow:0 0 0 300vmax #000;z-index:9999;transition:width 0.8s ease-in, height 0.8s ease-in;';
            document.body.appendChild(iris);
            requestAnimationFrame(() => { iris.style.width = '0px'; iris.style.height = '0px'; });
            setTimeout(() => { window.location.href = 'select.html'; }, 900);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
