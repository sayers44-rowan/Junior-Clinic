<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARC Engine - Title Screen</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0c0000;
            background-image: url('./assets/images/menu_bg.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            animation: bgPan 40s linear infinite alternate;
        }

        @keyframes bgPan {
            0% {
                background-position: 0% 50%;
                background-size: 100%;
                filter: brightness(0.8);
            }

            50% {
                filter: brightness(1.1);
            }

            100% {
                background-position: 100% 50%;
                background-size: 115%;
                filter: brightness(0.8);
            }
        }

        #title-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: float 6s ease-in-out infinite;
            z-index: 10;
            position: relative;
            margin-top: -15vh;
        }

        #logo-container {
            margin: 0;
            padding: 0;
        }

        #logo {
            max-width: 55vw;
            min-width: 300px;
            display: block;
            filter: drop-shadow(0px 10px 20px rgba(100, 0, 0, 0.4));
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .menu-container {
            margin-top: -10%;
            /* Dialed the gap down so it doesn't overlap the logo text */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

        .menu-btn {
            background: none;
            border: none;
            /* CRITICAL FIX: Base color is solid white now, not transparent */
            color: #ffffff;
            /* Added a permanent subtle dark drop shadow so it stands out against the red */
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8), 0px 0px 5px rgba(255, 0, 0, 0.3);
            font-family: 'Courier New', Courier, monospace;
            /* Dialed the size down slightly so it's sharp */
            font-size: 1.8vw;
            min-font-size: 20px;
            font-weight: bold;
            letter-spacing: 12px;
            cursor: pointer;
            text-transform: uppercase;
            padding: 10px 40px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .menu-btn:hover {
            color: #fff;
            letter-spacing: 16px;
            /* Hover adds the intense glow */
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.8), 0 0 30px rgba(255, 50, 50, 0.6);
            transform: scale(1.02);
        }

        .menu-btn::before {
            content: '>';
            position: absolute;
            left: 0;
            opacity: 0;
            color: #ff3333;
            transition: all 0.3s ease;
            transform: translateX(-20px);
        }

        .menu-btn:hover::before {
            opacity: 1;
            transform: translateX(10px);
        }

        .menu-btn::after {
            content: '<';
            position: absolute;
            right: 0;
            opacity: 0;
            color: #ff3333;
            transition: all 0.3s ease;
            transform: translateX(20px);
        }

        .menu-btn:hover::after {
            opacity: 1;
            transform: translateX(-10px);
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="vignette"></div>
    <div id="title-wrapper">
        <div id="logo-container">
            <img id="logo" src="./assets/ui/logo.png" alt="SPARC Logo">
        </div>

        <div class="menu-container">
            <button class="menu-btn" onclick="window.location.href='select.html'">START</button>
        </div>
    </div>
</body>

</html>
